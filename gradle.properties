org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true
# Reuse task outputs (compiled Kotlin, processed resources) across builds.
# In CI the build-cache dir is cached with a rolling key (see
# .github/actions/setup-toolchain) so it accumulates run-to-run, so the four
# heavy jobs stop each recompiling the whole 47-module tree from scratch.
# Cache reuse only substitutes byte-identical outputs, so release
# reproducibility (F-Droid) is unaffected.
org.gradle.caching=true
# Exploit the 47-module graph — modules with no dependency between them
# compile concurrently.
org.gradle.parallel=true
